<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>Step 1: Generate & Download Icons</h2>
<p>Click each button to download the icon, then upload both to your GitHub repo.</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="cscr" width="540" height="720" style="display:none"></canvas>
<br>
<button onclick="gen(192)" style="padding:12px 20px;background:#1D9E75;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin:6px">⬇ Download icon-192.png</button><br>
<button onclick="gen(512)" style="padding:12px 20px;background:#1D9E75;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin:6px">⬇ Download icon-512.png</button><br>
<button onclick="genScr()" style="padding:12px 20px;background:#534AB7;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin:6px">⬇ Download screenshot.png</button>
<p style="margin-top:16px;color:#888;font-size:13px">After downloading, upload all 3 files to your GitHub repo (ajaykabaddi/Crypto-signals)</p>

<script>
function gen(size) {
  const canvas = document.getElementById('c' + size);
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = '#1D9E75';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();
  // Chart line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = size * 0.03;
  ctx.beginPath();
  ctx.moveTo(size*0.1, size*0.7);
  ctx.lineTo(size*0.3, size*0.5);
  ctx.lineTo(size*0.5, size*0.6);
  ctx.lineTo(size*0.7, size*0.3);
  ctx.lineTo(size*0.9, size*0.4);
  ctx.stroke();
  // Arrow up
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size*0.45}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📈', size/2, size/2);

  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function genScr() {
  const canvas = document.getElementById('cscr');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1D9E75';
  ctx.fillRect(0, 0, 540, 100);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('📈 Crypto Signal Tracker', 270, 55);
  ctx.font = '16px sans-serif';
  ctx.fillText('Live Binance · Supertrend · Alerts', 270, 82);
  ctx.fillStyle = '#f4f4f4';
  ctx.fillRect(0, 100, 540, 620);
  // Simulate cards
  const cards = [
    {name:'BTC/USDT', price:'$67,420', signal:'▲ Buy Signal', color:'#1D9E75', bg:'#EAF3DE'},
    {name:'ETH/USDT', price:'$3,521', signal:'▼ Sell Signal', color:'#E24B4A', bg:'#FCEBEB'},
    {name:'BNB/USDT', price:'$598', signal:'▲ Buy Signal', color:'#1D9E75', bg:'#EAF3DE'},
  ];
  cards.forEach((c, i) => {
    const y = 120 + i * 160;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.roundRect(20, y, 500, 140, 12);
    ctx.fill();
    ctx.fillStyle = c.bg;
    ctx.beginPath();
    ctx.roundRect(30, y+10, 480, 50, 8);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(c.name, 50, y+42);
    ctx.fillStyle = '#666';
    ctx.font = '16px sans-serif';
    ctx.fillText(c.price, 350, y+42);
    ctx.fillStyle = c.color;
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(c.signal, 50, y+85);
    ctx.fillStyle = '#999';
    ctx.font = '13px sans-serif';
    ctx.fillText('SL: $66,800 | TP1: $68,200 | TP2: $69,500', 50, y+115);
  });
  const link = document.createElement('a');
  link.download = 'screenshot.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
